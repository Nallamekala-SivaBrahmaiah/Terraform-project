version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:6.0
    container_name: ecommerce-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecommerce-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: your-secret-key-change-in-production
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
    networks:
      - ecommerce-network

  # User Service
  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/userdb?authSource=admin
      JWT_SECRET: your-secret-key-change-in-production
    depends_on:
      - mongodb
    networks:
      - ecommerce-network

  # Product Service
  product-service:
    build: ./product-service
    container_name: product-service
    restart: always
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/productdb?authSource=admin
    depends_on:
      - mongodb
    networks:
      - ecommerce-network

  # Cart Service
  cart-service:
    build: ./cart-service
    container_name: cart-service
    restart: always
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/cartdb?authSource=admin
    depends_on:
      - mongodb
      - product-service
    networks:
      - ecommerce-network

  # Order Service
  order-service:
    build: ./order-service
    container_name: order-service
    restart: always
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/orderdb?authSource=admin
    depends_on:
      - mongodb
      - user-service
      - product-service
      - cart-service
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mongodb_data:

<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .product { border: 1px solid #ddd; padding: 10px; margin: 10px; border-radius: 5px; }
        .cart { border: 1px solid #ddd; padding: 10px; margin: 10px; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 5px 10px; cursor: pointer; }
        input { padding: 5px; margin: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>E-Commerce Store</h1>
        
        <!-- Login Section -->
        <div id="loginSection">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>

        <!-- Products Section -->
        <div id="productsSection" style="display: none;">
            <h2>Products</h2>
            <div id="products"></div>
        </div>

        <!-- Cart Section -->
        <div id="cartSection" style="display: none;">
            <h2>Shopping Cart</h2>
            <div id="cart"></div>
            <button onclick="checkout()">Checkout</button>
        </div>
    </div>

    <script>
        let token = null;
        let userId = null;

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    userId = data.userId;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('productsSection').style.display = 'block';
                    document.getElementById('cartSection').style.display = 'block';
                    loadProducts();
                    loadCart();
                } else {
                    alert('Login failed: ' + data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                const productsDiv = document.getElementById('products');
                productsDiv.innerHTML = products.map(product => `
                    <div class="product">
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <p>Price: $${product.price}</p>
                        <p>Stock: ${product.stock}</p>
                        <input type="number" id="qty-${product._id}" value="1" min="1" max="${product.stock}">
                        <button onclick="addToCart('${product._id}')">Add to Cart</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        async function addToCart(productId) {
            const quantity = document.getElementById(`qty-${productId}`).value;

            try {
                const response = await fetch(`/api/cart/${userId}/items`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ productId, quantity: parseInt(quantity) })
                });

                if (response.ok) {
                    alert('Product added to cart!');
                    loadCart();
                } else {
                    const data = await response.json();
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function loadCart() {
            try {
                const response = await fetch(`/api/cart/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const cart = await response.json();
                const cartDiv = document.getElementById('cart');
                
                if (cart.items && cart.items.length > 0) {
                    cartDiv.innerHTML = `
                        <ul>
                            ${cart.items.map(item => `
                                <li>${item.name} - Quantity: ${item.quantity} - Price: $${item.price * item.quantity}</li>
                            `).join('')}
                        </ul>
                        <p>Total: $${cart.totalAmount}</p>
                    `;
                } else {
                    cartDiv.innerHTML = '<p>Your cart is empty</p>';
                }
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }

        async function checkout() {
            try {
                // Get cart items
                const cartResponse = await fetch(`/api/cart/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const cart = await cartResponse.json();

                if (!cart.items || cart.items.length === 0) {
                    alert('Your cart is empty!');
                    return;
                }

                // Create order
                const orderResponse = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        userId,
                        items: cart.items,
                        paymentMethod: 'credit_card'
                    })
                });

                if (orderResponse.ok) {
                    const order = await orderResponse.json();
                    alert(`Order placed successfully! Order ID: ${order._id}`);
                    loadCart(); // Refresh cart (should be empty now)
                } else {
                    const data = await orderResponse.json();
                    alert('Checkout failed: ' + data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
